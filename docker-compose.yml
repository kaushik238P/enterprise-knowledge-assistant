services:

  eka:
    image: kaushik238p/enterprise-knowledge-assistant:latest

    container_name: eka

    restart: unless-stopped

    ports:
      - "8000:8000"
      - "8501:8501"

    env_file:
      - .env

    environment:
      QDRANT_URL: http://qdrant:6333

    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest

    container_name: qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: